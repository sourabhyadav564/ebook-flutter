name: ebook_library_app
description: Digital Ebook Library — Sagar Fab International Assignment
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # HTTP & Networking
  dio: ^5.4.3+1

  # File handling
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  open_filex: ^4.4.1+1

  # PDF Reader
  syncfusion_flutter_pdfviewer: 33.2.12

  # Images
  cached_network_image: ^3.3.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Persistence
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.19.0
  epub_view: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
